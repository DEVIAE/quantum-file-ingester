apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-ingester
  labels:
    app: file-ingester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-ingester
  template:
    metadata:
      labels:
        app: file-ingester
    spec:
      containers:
      - name: file-ingester
        image: image-registry.openshift-image-registry.svc:5000/felipesoto-dev/file-ingester:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "openshift"
        - name: AMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: file-ingester-config
              key: AMQ_HOST
        - name: AMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: file-ingester-config
              key: AMQ_PORT
        - name: AMQ_USER
          valueFrom:
            secretKeyRef:
              name: amq-credentials
              key: username
              optional: true
        - name: AMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amq-credentials
              key: password
              optional: true
        - name: CHUNK_SIZE
          valueFrom:
            configMapKeyRef:
              name: file-ingester-config
              key: CHUNK_SIZE
        - name: INPUT_DIR
          valueFrom:
            configMapKeyRef:
              name: file-ingester-config
              key: INPUT_DIR
        - name: ELASTIC_URL
          value: "https://my-elasticsearch-project-f330d4.es.us-central1.gcp.elastic.cloud:443"
        - name: ELASTIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: elastic-credentials
              key: api-key
              optional: true
        - name: ELASTIC_INDEX
          value: "file-ingester-chunks"
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 5
        volumeMounts:
        - name: quantum-data
          mountPath: /data
      volumes:
      - name: quantum-data
        persistentVolumeClaim:
          claimName: quantum-data-pvc
