spring:
  application:
    name: quantum-file-ingester

  artemis:
    broker-url: tcp://${AMQ_HOST:localhost}:${AMQ_PORT:61616}
    user: ${AMQ_USER:admin}
    password: ${AMQ_PASSWORD:admin}

ingester:
  input-dir:      ${INPUT_DIR:/data/process}
  processed-dir:  ${PROCESSED_DIR:/data/processed}
  failed-dir:     ${FAILED_DIR:/data/failed}
  output-dir:     ${OUTPUT_DIR:/data/output}
  chunk-size:     ${CHUNK_SIZE:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    jms:
      enabled: false
  metrics:
    tags:
      application: file-ingester
    export:
      prometheus:
        enabled: true

server:
  port: ${SERVER_PORT:8081}

# ELK Configuration
elk:
  enabled: ${ELK_ENABLED:true}

  logstash:
    host: ${LOGSTASH_HOST:localhost}
    port: ${LOGSTASH_PORT:5000}

  elasticsearch:
    url: ${ELASTIC_URL:https://my-elasticsearch-project-f330d4.es.us-central1.gcp.elastic.cloud:443}
    api-key: ${ELASTIC_API_KEY:VlEtV3dad0IzWFZmOXVsRlNkdi06RWFpMlc2YlRlbjhXeXVtTV9UWEVNdw==}
    index: ${ELASTIC_INDEX:file-ingester-chunks}

logging:
  level:
    com.quantum: INFO
    org.apache.camel: INFO
    org.apache.activemq: WARN
  config: classpath:logback-spring.xml