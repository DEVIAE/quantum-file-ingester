spring:
  application:
    name: quantum-file-ingester

  artemis:
    broker-url: tcp://${AMQ_HOST:localhost}:${AMQ_PORT:61616}
    user: ${AMQ_USER:admin}
    password: ${AMQ_PASSWORD:admin}

ingester:
  input-dir: ${INPUT_DIR:input}
  noop: ${FILE_NOOP:true}
  chunk-size: ${CHUNK_SIZE:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    jms:
      enabled: false
  metrics:
    tags:
      application: file-ingester
    export:
      prometheus:
        enabled: true

server:
  port: ${SERVER_PORT:8081}

# ELK Configuration (R1, R2, R3)
elk:
  logstash:
    host: ${LOGSTASH_HOST:localhost}
    port: ${LOGSTASH_PORT:5000}
  enabled: ${ELK_ENABLED:true}

logging:
  level:
    com.quantum: INFO
    org.apache.camel: INFO
    org.apache.activemq: WARN
  config: classpath:logback-spring.xml
